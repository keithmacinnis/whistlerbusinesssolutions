<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Order Confirmed | Whistler Business Solutions</title>
  <link rel="icon" href="/wbs-icon.svg" type="image/svg+xml">

      <div class="theme-container text-center">
        <h1 class="theme-heading h2">Thank you for your order! 🎉</h1>

  <script>
    // Payment completed — now it's safe to empty the cart.
    try { localStorage.removeItem('wbs_cart_whistler'); } catch (e) { /* ignore */ }
