<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16324f"/>
      <stop offset="1" stop-color="#0b1d33"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- mountains from wbs-logo.svg, scaled up and centered, no wordmark -->
  <g transform="translate(-86 0) scale(1.15)">
    <polygon points="640,255 940,625 340,625" fill="#a9c8e8"/>
    <polygon points="640,255 700,329 664,311 640,340 610,305 580,329" fill="#eef4fa"/>
    <polygon points="400,320 700,625 100,625" fill="#f4f7fa"/>
    <polygon points="400,320 700,625 400,625" fill="#d3e1ef"/>
    <rect x="100" y="625" width="840" height="10" fill="#3d6b99"/>
  </g>
</svg>
